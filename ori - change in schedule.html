
<style>
  .ng { cursor: pointer; }
  .ng:hover rect { opacity: .85; }
</style>
<svg width="100%" viewBox="0 0 680 720" role="img">
  <title>Change task time in schedule — Ori user flow</title>
  <desc>Shows how a user moves a task in the Ori schedule and how the AI recalculates the calendar</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" text-anchor="middle" style="font-size:15px;font-weight:500;fill:var(--color-text-primary)">Change task time in schedule</text>

  <text x="40" y="50" style="font-size:11px;fill:var(--color-text-secondary)">■ purple = user action</text>
  <text x="200" y="50" style="font-size:11px;fill:var(--color-text-secondary)">■ teal = app / AI response</text>
  <text x="390" y="50" style="font-size:11px;fill:var(--color-text-secondary)">■ gray = decision</text>

  <!-- Step 1 -->
  <g class="ng" onclick="sendPrompt('How does the Schedule view work in Ori?')">
    <rect x="190" y="64" width="300" height="56" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
    <text x="340" y="84" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:500;fill:#3C3489">1 · User opens Schedule tab</text>
    <text x="340" y="102" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#534AB7">Day / Week / Month view available</text>
  </g>
  <line x1="340" y1="120" x2="340" y2="144" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <g class="ng" onclick="sendPrompt('How do you move a task in Ori schedule?')">
    <rect x="190" y="144" width="300" height="56" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
    <text x="340" y="164" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:500;fill:#3C3489">2 · User moves task to new slot</text>
    <text x="340" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#534AB7">Drag &amp; drop or tap → edit start time manually</text>
  </g>
  <line x1="340" y1="200" x2="340" y2="224" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Step 3: internal -->
  <g class="ng" onclick="sendPrompt('What does Ori check when you manually move a session?')">
    <rect x="110" y="224" width="460" height="72" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
    <text x="340" y="246" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:500;fill:#085041">3 · AI checks all 4 planning layers</text>
    <text x="340" y="264" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#0F6E56">A: Hard constraints (calendar sync, sleep, fixed work blocks)</text>
    <text x="340" y="280" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#0F6E56">B: Habits · C: AI sessions · D: Ad-hoc tasks</text>
  </g>
  <line x1="340" y1="296" x2="340" y2="320" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Decision -->
  <g onclick="sendPrompt('What is a calendar conflict in Ori and how is it resolved?')">
    <rect x="200" y="320" width="280" height="44" rx="8" stroke-width="0.5" fill="#F1EFE8" stroke="#5F5E5A"/>
    <text x="340" y="345" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:500;fill:#2C2C2A">Conflict with a fixed block?</text>
  </g>

  <!-- Yes branch right -->
  <line x1="480" y1="342" x2="558" y2="378" stroke="#E24B4A" stroke-width="1" marker-end="url(#arr)"/>
  <text x="530" y="368" text-anchor="middle" style="font-size:10px;fill:#E24B4A">Yes</text>
  <g class="ng" onclick="sendPrompt('How does Ori suggest an alternative when there is a scheduling conflict?')">
    <rect x="496" y="382" width="152" height="56" rx="6" stroke-width="0.5" fill="#FCEBEB" stroke="#A32D2D"/>
    <text x="572" y="402" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#501313">Ori flags conflict</text>
    <text x="572" y="418" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#A32D2D">Offers alternative slot</text>
    <text x="572" y="430" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#A32D2D">or opens AI chat</text>
  </g>
  <line x1="572" y1="438" x2="572" y2="472" stroke="#888780" stroke-width="0.8"/>
  <line x1="572" y1="472" x2="480" y2="472" stroke="#888780" stroke-width="0.8" marker-end="url(#arr)"/>

  <!-- No branch left -->
  <line x1="200" y1="342" x2="122" y2="378" stroke="#1D9E75" stroke-width="1" marker-end="url(#arr)"/>
  <text x="148" y="368" text-anchor="middle" style="font-size:10px;fill:#1D9E75">No</text>
  <g class="ng" onclick="sendPrompt('What happens when a task slot is free in Ori?')">
    <rect x="32" y="382" width="152" height="44" rx="6" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
    <text x="108" y="398" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#085041">Slot is free</text>
    <text x="108" y="414" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#0F6E56">Move confirmed</text>
  </g>
  <line x1="108" y1="426" x2="108" y2="472" stroke="#888780" stroke-width="0.8"/>
  <line x1="108" y1="472" x2="200" y2="472" stroke="#888780" stroke-width="0.8" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <g class="ng" onclick="sendPrompt('How does Ori detect milestone delays from a schedule change?')">
    <rect x="150" y="472" width="380" height="56" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
    <text x="340" y="492" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:500;fill:#085041">4 · AI checks milestone impact</text>
    <text x="340" y="510" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#0F6E56">"Moving this delays Milestone 1 by 2 days"</text>
  </g>
  <line x1="340" y1="528" x2="340" y2="552" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <g class="ng" onclick="sendPrompt('What does Ori show when it auto-reschedules after a manual change?')">
    <rect x="150" y="552" width="380" height="56" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
    <text x="340" y="572" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:500;fill:#085041">5 · Ori notifies user of ripple changes</text>
    <text x="340" y="590" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#0F6E56">"I've adjusted the rest of this week to keep you on track"</text>
  </g>
  <line x1="340" y1="608" x2="340" y2="632" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Step 6 -->
  <g class="ng" onclick="sendPrompt('Can users approve or reject auto-reschedule suggestions in Ori?')">
    <rect x="150" y="632" width="380" height="56" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
    <text x="340" y="652" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:500;fill:#3C3489">6 · User accepts or adjusts suggestion</text>
    <text x="340" y="670" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#534AB7">"Sounds Good" → calendar updated instantly</text>
  </g>
</svg>
